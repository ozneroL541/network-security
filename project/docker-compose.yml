###############################################################
#  Vulnerability Assessment Lab
#
#  Network: 172.30.0.0/22
#    host     - 172.30.0.1/24
#    vulnbox1 - 172.30.0.2/24 172.30.1.1/24
#    vulnbox2 - 172.30.1.2/24 172.30.2.1/24
#    vulnbox3 - 172.30.2.2/24
#    vulnbox4 - 172.30.2.3/24
#    vulnbox5 - 172.30.2.4/24 172.30.3.1/24
#    vulnbox6 - 172.30.3.2/24
###############################################################

networks:
  # Bridge – directly reachable from host
  net0:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.254

  # Internal macvlan segments – isolated from host, routed only through vulnbox1
  net1:
    driver: bridge
    internal: true          # blocks direct host ↔ net1 traffic
    ipam:
      config:
        - subnet: 172.30.1.0/24
          gateway: 172.30.1.254

  net2:
    driver: bridge
    internal: true          # blocks direct host ↔ net2 traffic
    ipam:
      config:
        - subnet: 172.30.2.0/24
          gateway: 172.30.2.254

  net3:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.3.0/24
          gateway: 172.30.3.254


services:
  # ─── VULNBOX 1 – Entering node ─────────────────────────
  vulnbox1:
    build:
      context: ./network/vulnbox-1
      dockerfile: Dockerfile
    container_name: vulnbox1
    hostname: vulnbox1
    networks:
      net0:
        ipv4_address: 172.30.0.2
      net1:
        ipv4_address: 172.30.1.1
    cap_add:
      - NET_ADMIN
    privileged: true
    restart: unless-stopped

  # ─── VULNBOX 2 – Apache Struts 2.3.31 (CVE-2017-5638) ────
  vulnbox2:
    build:
      context: ./network/vulnbox-2
      dockerfile: Dockerfile
    container_name: vulnbox2
    hostname: vulnbox2
    networks:
      net1:
        ipv4_address: 172.30.1.2
      net2:
        ipv4_address: 172.30.2.1
    cap_add:
      - NET_ADMIN
    privileged: true
    restart: unless-stopped

  # ─── VULNBOX 3 – DVWA ─────────────────────────────────────
  vulnbox3:
    build:
      context: ./network/vulnbox-3
      dockerfile: Dockerfile
    container_name: vulnbox3
    hostname: vulnbox3
    networks:
      net2:
        ipv4_address: 172.30.2.2
    cap_add:
      - NET_ADMIN
    privileged: true
    restart: unless-stopped

  # ─── VULNBOX 4 – SSH weak credentials ────────────────────
  vulnbox4:
    build:
      context: ./network/vulnbox-4
      dockerfile: Dockerfile
    container_name: vulnbox4
    hostname: vulnbox4
    networks:
      net2:
        ipv4_address: 172.30.2.3
    cap_add:
      - NET_ADMIN
    privileged: true
    restart: unless-stopped

  # ─── VULNBOX 5 – Samba ───────────────────────────────────
  vulnbox5:
    build:
      context: ./network/vulnbox-5
      dockerfile: Dockerfile
    container_name: vulnbox5
    hostname: vulnbox5
    networks:
      net2:
        ipv4_address: 172.30.2.4
      net3:
        ipv4_address: 172.30.3.1
    cap_add:
      - NET_ADMIN
    privileged: true
    restart: unless-stopped

  # ─── VULNBOX 6 – MySQL no root password ──────────────────
  vulnbox6:
    build:
      context: ./network/vulnbox-6
      dockerfile: Dockerfile
    container_name: vulnbox6
    hostname: vulnbox6
    networks:
      net3:
        ipv4_address: 172.30.3.2
    restart: unless-stopped
